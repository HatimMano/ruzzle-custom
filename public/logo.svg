<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" width="320" height="380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cellActive" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cellGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cellViolet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-blue">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.6"/>
    </filter>
    <filter id="glow-gold">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f59e0b" flood-opacity="0.5"/>
    </filter>
    <clipPath id="roundedSquare">
      <rect x="20" y="20" width="280" height="280" rx="36" ry="36"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect x="20" y="20" width="280" height="280" rx="36" ry="36" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Grill lines (horizontal) -->
  <line x1="44" y1="100" x2="276" y2="100" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="160" x2="276" y2="160" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="220" x2="276" y2="220" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Grill lines (vertical) -->
  <line x1="100" y1="44" x2="100" y2="276" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="160" y1="44" x2="160" y2="276" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="220" y1="44" x2="220" y2="276" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cell (1,1) — G — blue highlight -->
  <rect x="36" y="36" width="52" height="52" rx="12" fill="url(#cellActive)" filter="url(#glow-blue)"/>
  <text x="62" y="71" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="white">G</text>

  <!-- Cell (1,2) — R — dark -->
  <rect x="108" y="36" width="52" height="52" rx="12" fill="#334155"/>
  <text x="134" y="71" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#94a3b8">R</text>

  <!-- Cell (1,3) — I — gold -->
  <rect x="168" y="36" width="52" height="52" rx="12" fill="url(#cellGold)" filter="url(#glow-gold)"/>
  <text x="194" y="71" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="white">I</text>

  <!-- Cell (1,4) — dark -->
  <rect x="228" y="36" width="52" height="52" rx="12" fill="#334155"/>
  <text x="254" y="71" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">D</text>

  <!-- Row 2 -->
  <rect x="36" y="108" width="52" height="52" rx="12" fill="#334155"/>
  <text x="62" y="143" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">D</text>

  <rect x="108" y="108" width="52" height="52" rx="12" fill="url(#cellViolet)"/>
  <text x="134" y="143" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="white">L</text>

  <rect x="168" y="108" width="52" height="52" rx="12" fill="#334155"/>
  <text x="194" y="143" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">E</text>

  <rect x="228" y="108" width="52" height="52" rx="12" fill="#334155"/>
  <text x="254" y="143" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">S</text>

  <!-- Row 3 -->
  <rect x="36" y="168" width="52" height="52" rx="12" fill="#334155"/>
  <text x="62" y="203" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">T</text>

  <rect x="108" y="168" width="52" height="52" rx="12" fill="#334155"/>
  <text x="134" y="203" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">A</text>

  <rect x="168" y="168" width="52" height="52" rx="12" fill="#334155"/>
  <text x="194" y="203" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">R</text>

  <rect x="228" y="168" width="52" height="52" rx="12" fill="#334155"/>
  <text x="254" y="203" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">E</text>

  <!-- Row 4 -->
  <rect x="36" y="228" width="52" height="52" rx="12" fill="#334155"/>
  <text x="62" y="263" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">M</text>

  <rect x="108" y="228" width="52" height="52" rx="12" fill="#334155"/>
  <text x="134" y="263" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">O</text>

  <rect x="168" y="228" width="52" height="52" rx="12" fill="#334155"/>
  <text x="194" y="263" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">T</text>

  <rect x="228" y="228" width="52" height="52" rx="12" fill="#334155"/>
  <text x="254" y="263" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="28" fill="#475569">S</text>

  <!-- Word "GRIDDLE" below -->
  <text x="160" y="340" text-anchor="middle"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900" font-size="38" letter-spacing="8"
    fill="white">GRIDDLE</text>

  <!-- Subtle tagline -->
  <text x="160" y="368" text-anchor="middle"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-weight="400" font-size="12" letter-spacing="4"
    fill="#475569">WORD GAME</text>
</svg>
